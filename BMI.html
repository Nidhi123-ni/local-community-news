<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<style>
    body{
        background-image:url(10558814.jpg);
        background-size: cover;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px;
        margin: 10px;
        
    }
    .container{
        border: 1px;
        height:350px;
        width: 300px;
        padding: 10px;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-content: center;
        background-color: rgba(0, 0, 255, 0.148);
        border-radius: 10px 10px 10px 10px;
        align-items: center;
    }
    input{
        background-color: rgba(255, 255, 255, 0.573);
        color: black;
        border-radius:5px ;
        border: 2px solid black;
    }
    h1{
        text-align: center;
        text-shadow: 2px 2px 2px black;
        color: royalblue;
        margin-bottom: 25px;
    }
    button{
        background-color: royalblue;
        height: 30px;
        width: 100px;
        color: white;
        border: none;
        border-radius: 5px ;
        text-align: center;
        padding: 10px 10px 10px 10px;

    }
    button:hover{
       height: 40px;
       width: 120px;
       background-color: rgb(148, 9, 146);

    }
    .result{
        color: blue;
        font-weight: 100;
        padding: 10px 10px;
        text-align: center;
    }
    #result{
        color: blueviolet;
        font-weight: 900;
    }
    .comment{
        color: blueviolet;
        font-weight: 700;
        font-family: Arial, Helvetica, sans-serif;
    }

    
</style>
<body>
    <div class="container">
    <h1>BMI CALCULATOR</h1>

    <p>Weight(in kgs) : <input type="number" placeholder="enter your weight" id="Weight"></p>
    <p>Height(in cm) : <input type="number" placeholder="enter your Height" id="Height"></p>
    <button id="calculate">Calculate</button>
     <script src="bmi.js"></script>
    <div class="result">
        <p>YOUR BMI IS : </p>
        <div id="result">0.00</div>
        <p class="comment"></p>
    </div>
   
    </div>
    


    
</body>
</html>
